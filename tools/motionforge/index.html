<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MOTION FORGE — DRIVN RIGS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
	:root {
		--ink:#14110c; --panel:#1d1913; --panel2:#262017; --bone:#e8e0cf; --dim:#9a8f78;
		--amber:#f0b429; --rust:#8a4a2b; --blood:#c0392b; --line:#3a3226; --steel:#5a6b6a; --good:#4caf6a;
	}
	* { margin:0; padding:0; box-sizing:border-box; }
	body { background:var(--ink); color:var(--bone); font:14px/1.45 ui-monospace,"Cascadia Mono",Consolas,monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
	header { display:flex; align-items:baseline; gap:16px; padding:10px 16px; border-bottom:2px solid var(--rust); background:var(--panel); }
	header h1 { font-size:18px; letter-spacing:3px; color:var(--amber); font-weight:700; }
	header .sub { color:var(--dim); font-size:12px; letter-spacing:1px; }
	header a { color:var(--amber); margin-left:auto; text-decoration:none; border:1px solid var(--line); padding:3px 10px; }
	header a:hover { background:var(--panel2); }
	main { flex:1; display:flex; min-height:0; }
	button, select, input, textarea { background:var(--panel2); color:var(--bone); border:1px solid var(--line); padding:5px 9px; font:inherit; font-size:12px; }
	button { cursor:pointer; } button:hover { border-color:var(--amber); }
	button.danger:hover { border-color:var(--blood); color:var(--blood); }
	input[type=range] { accent-color:var(--amber); height:4px; padding:0; }
	/* left — rigs & motions */
	#roster { width:210px; background:var(--panel); border-right:1px solid var(--line); overflow-y:auto; flex-shrink:0; }
	#roster h2 { font-size:11px; letter-spacing:2px; color:var(--dim); padding:12px 12px 4px; text-transform:uppercase; }
	.mrow { padding:7px 12px 7px 22px; cursor:pointer; border-left:3px solid transparent; display:flex; justify-content:space-between; align-items:baseline; }
	.mrow:hover { background:var(--panel2); }
	.mrow.on { border-left-color:var(--amber); background:var(--panel2); }
	.mrow b { font-weight:600; }
	.mrow .tunedmark { color:var(--amber); font-size:11px; }
	.mrow .stockmark { color:var(--dim); font-size:11px; }
	/* center — the param editor */
	#editor { flex:1; overflow-y:auto; padding:16px 20px; }
	.ehead { display:flex; align-items:baseline; gap:12px; margin-bottom:6px; }
	.ehead h2 { font-size:20px; letter-spacing:1px; color:var(--amber); font-weight:700; }
	.ehead .rig { color:var(--dim); font-size:12px; }
	.ehead button { margin-left:auto; }
	.ehint { color:var(--dim); font-size:12px; margin-bottom:14px; border-bottom:1px solid var(--line); padding-bottom:8px; }
	.ehint b { color:var(--bone); }
	.stat { display:grid; grid-template-columns:150px 1fr 84px 90px; align-items:center; gap:10px; margin-bottom:8px; }
	.stat label { font-size:12px; color:var(--dim); overflow:hidden; text-overflow:ellipsis; }
	.stat.tuned label { color:var(--bone); }
	.stat.tuned label::before { content:"● "; color:var(--amber); }
	.stat input[type=range] { width:100%; }
	.stat input[type=number] { width:100%; text-align:right; }
	.stat .stock { color:var(--dim); opacity:.8; font-size:11px; text-align:right; white-space:nowrap; }
	/* right — describe it */
	#describe { width:340px; background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; padding:12px; flex-shrink:0; display:flex; flex-direction:column; }
	#describe h2 { font-size:11px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }
	#dctx { font-size:11px; color:var(--dim); margin-bottom:6px; }
	#dctx b { color:var(--amber); }
	#dtext { width:100%; height:74px; resize:vertical; margin-bottom:8px; }
	#dapply { width:100%; margin-bottom:12px; letter-spacing:1px; }
	#dlog { flex:1; overflow-y:auto; }
	.entry { border:1px solid var(--line); background:var(--panel2); padding:8px; margin-bottom:8px; font-size:12px; }
	.entry .etext { color:var(--bone); margin-bottom:6px; }
	.entry .etext::before { content:"“"; color:var(--dim); } .entry .etext::after { content:"”"; color:var(--dim); }
	.entry .ediff { margin-bottom:6px; }
	.entry .ediff div { display:flex; justify-content:space-between; gap:8px; }
	.entry .ediff .pname { color:var(--amber); }
	.entry .ediff .pval { color:var(--bone); } .entry .ediff .pval .old { color:var(--dim); text-decoration:line-through; margin-right:6px; }
	.entry .erat { color:var(--dim); font-size:11px; border-top:1px solid var(--line); padding-top:5px; }
	.entry.err { border-color:var(--blood); } .entry.err .etext { color:var(--blood); }
	footer { display:flex; gap:16px; padding:7px 16px; background:var(--panel); border-top:1px solid var(--line); font-size:12px; color:var(--dim); }
	footer b { color:var(--bone); }
	#saved { color:var(--amber); font-size:12px; margin-left:auto; }
</style>
</head>
<body>
<header>
	<h1>MOTION FORGE</h1>
	<span class="sub">DRIVN RIGS · procedural sin()-rig rows · tune → FORGE reload</span>
	<a href="/api/help" target="_blank">API — for humans &amp; AIs</a>
</header>
<main>
	<div id="roster"></div>
	<div id="editor"><div style="color:var(--dim);margin-top:40px;text-align:center">Select a motion to tune.</div></div>
	<div id="describe">
		<h2>Describe it</h2>
		<div id="dctx">patches <b id="dtarget">—</b></div>
		<textarea id="dtext" placeholder="e.g. make the sniff deeper and slower&#10;the run looks stiff, loosen the front legs&#10;tail wag much wider"></textarea>
		<button id="dapply">APPLY → PATCH THE ROW</button>
		<div id="dlog"></div>
	</div>
</main>
<footer>
	<span id="info">—</span>
	<span>Live preview: run the game (<b>F10 → FORGE reload</b>) or the treadmill scene <b>res://proto3d/tools/motion_stage.tscn</b></span>
	<span id="saved"></span>
</footer>
<script>
let rigs = {}, defaults = {}, sel = null, cur = null; // cur = {rig, motion, params, tuned, stock}
const $ = (s) => document.querySelector(s);
async function api(path, opts) { const r = await fetch(path, opts); const j = await r.json(); if (!r.ok) { const e = new Error(j.error || r.status); e.body = j; throw e; } return j; }
function flash(m) { const el = $("#saved"); el.textContent = m; clearTimeout(el._t); el._t = setTimeout(() => el.textContent = "", 1600); }
const fmt = (v) => (Math.round(v * 10000) / 10000).toString();

async function load(keepSel) {
	rigs = (await api("/api/rigs")).rigs;
	defaults = await api("/api/defaults");
	renderRoster();
	if (!keepSel || !sel) {
		const first = rigs.puppet ? { rig: "puppet", motion: rigs.puppet.motions[0] } : null;
		const r0 = Object.keys(rigs)[0];
		sel = first || (r0 ? { rig: r0, motion: rigs[r0].motions[0] } : null);
	}
	if (sel) await select(sel.rig, sel.motion);
	const nrigs = Object.keys(rigs).length, nmot = Object.values(rigs).reduce((a, r) => a + r.motions.length, 0);
	$("#info").innerHTML = `<b>${nrigs}</b> rigs · <b>${nmot}</b> motions · source <b>game/data/motions.json</b> (overrides over engine stock)`;
}
function renderRoster() {
	const el = $("#roster"); el.innerHTML = "";
	for (const rid of Object.keys(rigs).sort()) {
		const h = document.createElement("h2"); h.textContent = rid; el.appendChild(h);
		for (const m of rigs[rid].motions) {
			const tuned = rigs[rid].tuned.includes(m);
			const d = document.createElement("div");
			d.className = "mrow" + (sel && sel.rig === rid && sel.motion === m ? " on" : "");
			d.innerHTML = `<b>${m}</b>` + (tuned ? `<span class="tunedmark">● tuned</span>` : `<span class="stockmark">stock</span>`);
			d.onclick = () => select(rid, m);
			el.appendChild(d);
		}
	}
}
async function select(rig, motion) {
	sel = { rig, motion };
	cur = await api(`/api/rig?id=${encodeURIComponent(rig)}&motion=${encodeURIComponent(motion)}`);
	renderRoster(); renderEditor();
	$("#dtarget").textContent = `${rig} / ${motion}`;
}
function bounds(stock, curv) { // slider range sized off the stock (or current) value
	const base = Math.max(Math.abs(stock ?? 0), Math.abs(curv ?? 0), 0.05);
	const max = +(base * 2.5).toPrecision(2);
	return { min: 0, max, step: +(max / 250).toPrecision(1) };
}
function renderEditor() {
	if (!cur) return;
	const ed = $("#editor");
	const names = Object.keys(cur.params).sort((a, b) => a.localeCompare(b));
	const hasStock = Object.keys(cur.stock).length > 0;
	ed.innerHTML = `
	<div class="ehead">
		<h2>${cur.motion}</h2><span class="rig">rig: ${cur.rig}</span>
		<button id="reset" class="danger" title="DELETE the tuned row — every param back to the engine's stock literal">↺ RESET TO STOCK</button>
	</div>
	<div class="ehint">${hasStock ? `ghosted number = <b>stock</b> (the engine literal); ● = tuned override in motions.json` : `no engine stock for this motion — all params are tuned rows`}</div>
	${names.map((n) => {
		const v = cur.params[n], st = cur.stock[n];
		const tuned = n in cur.tuned;
		const b = bounds(st, v);
		return `<div class="stat${tuned ? " tuned" : ""}" id="row-${n}">
			<label title="${n}">${n}</label>
			<input type="range" min="${b.min}" max="${b.max}" step="${b.step}" value="${v}" data-k="${n}">
			<input type="number" step="${b.step}" value="${v}" data-k="${n}">
			<span class="stock">${st !== undefined ? "stock " + fmt(st) : "no stock"}</span>
		</div>`;
	}).join("")}`;
	ed.querySelectorAll("input").forEach((el) => el.addEventListener("input", () => onEdit(el.dataset.k, el.value, el)));
	$("#reset").onclick = resetMotion;
}
let _saveT = null;
function onEdit(key, raw, el) {
	const val = Number(raw);
	if (!Number.isFinite(val)) return;
	cur.params[key] = val;
	document.querySelectorAll(`[data-k="${key}"]`).forEach((x) => { if (x !== el) x.value = val; });
	$(`#row-${key}`).classList.add("tuned");
	clearTimeout(_saveT);
	_saveT = setTimeout(async () => {
		try {
			cur = await api(`/api/rig?id=${encodeURIComponent(cur.rig)}&motion=${encodeURIComponent(cur.motion)}`,
				{ method: "PATCH", body: JSON.stringify({ [key]: val }) });
			flash(`${cur.rig}/${cur.motion} saved`);
			rigs = (await api("/api/rigs")).rigs; renderRoster();
		} catch (e) { flash("save failed: " + e.message); }
	}, 250);
}
async function resetMotion() {
	if (!confirm(`Reset ${cur.rig}/${cur.motion} to stock? (clears the tuned row)`)) return;
	await api(`/api/rig?id=${encodeURIComponent(cur.rig)}&motion=${encodeURIComponent(cur.motion)}`, { method: "DELETE" });
	flash(`${cur.rig}/${cur.motion} → stock`);
	await load(true);
}
$("#dapply").onclick = async () => {
	const text = $("#dtext").value.trim();
	if (!text || !sel) return;
	const btn = $("#dapply"); btn.disabled = true;
	try {
		const r = await api("/api/describe", { method: "POST", body: JSON.stringify({ rig: sel.rig, motion: sel.motion, text }) });
		logEntry(text, r);
		$("#dtext").value = "";
		flash("described → patched");
		await load(true);
	} catch (e) {
		logError(text, e.body || { error: e.message });
	} finally { btn.disabled = false; }
};
$("#dtext").addEventListener("keydown", (e) => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) $("#dapply").click(); });
function logEntry(text, r) {
	const d = document.createElement("div"); d.className = "entry";
	d.innerHTML = `<div class="etext">${escapeHtml(text)}</div>
		<div class="ediff">${Object.keys(r.diff).map((k) =>
			`<div><span class="pname">${k}</span><span class="pval"><span class="old">${fmt(r.was[k])}</span>${fmt(r.diff[k])}</span></div>`).join("")}</div>
		<div class="erat">${escapeHtml(r.rationale)}</div>`;
	$("#dlog").prepend(d);
}
function logError(text, body) {
	const d = document.createElement("div"); d.className = "entry err";
	const u = body.understands;
	d.innerHTML = `<div class="etext">${escapeHtml(text)}</div>
		<div class="erat">${escapeHtml(body.error || "failed")}${u ? `<br><br>directions: ${escapeHtml(u.directions)}<br>targets: ${escapeHtml(u.targets)}` : ""}</div>`;
	$("#dlog").prepend(d);
}
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
load();
</script>
</body>
</html>
