<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MAPFORGE — DEATHLANDS USA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
	:root {
		--ink: #14110c; --panel: #1d1913; --panel2: #262017;
		--bone: #e8e0cf; --dim: #9a8f78; --amber: #f0b429; --rust: #8a4a2b;
		--blood: #c0392b; --line: #3a3226;
	}
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body { background: var(--ink); color: var(--bone); font: 14px/1.45 ui-monospace, "Cascadia Mono", Consolas, monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
	header { display: flex; align-items: baseline; gap: 16px; padding: 10px 16px; border-bottom: 2px solid var(--rust); background: var(--panel); }
	header h1 { font-size: 18px; letter-spacing: 3px; color: var(--amber); font-weight: 700; }
	header .sub { color: var(--dim); font-size: 12px; letter-spacing: 1px; }
	header a { color: var(--amber); margin-left: auto; text-decoration: none; border: 1px solid var(--line); padding: 3px 10px; }
	header a:hover { background: var(--panel2); }
	main { flex: 1; display: flex; min-height: 0; }
	#side { width: 240px; background: var(--panel); border-right: 1px solid var(--line); padding: 12px; overflow-y: auto; flex-shrink: 0; }
	.sec { margin-bottom: 16px; }
	.sec h2 { font-size: 11px; letter-spacing: 2px; color: var(--dim); border-bottom: 1px solid var(--line); padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
	.swatches { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
	.sw { display: flex; align-items: center; gap: 6px; padding: 4px 6px; cursor: pointer; border: 1px solid transparent; font-size: 12px; }
	.sw:hover { background: var(--panel2); }
	.sw.on { border-color: var(--amber); background: var(--panel2); }
	.sw i { width: 14px; height: 14px; display: inline-block; border: 1px solid #0008; }
	.row { display: flex; gap: 4px; flex-wrap: wrap; }
	button, select { background: var(--panel2); color: var(--bone); border: 1px solid var(--line); padding: 5px 9px; font: inherit; font-size: 12px; cursor: pointer; }
	button:hover { border-color: var(--amber); }
	button.on { border-color: var(--amber); color: var(--amber); }
	button.danger:hover { border-color: var(--blood); color: var(--blood); }
	#wrap { flex: 1; overflow: auto; display: grid; place-items: center; background: repeating-linear-gradient(45deg, #100d09 0 12px, #12100b 12px 24px); }
	canvas { image-rendering: pixelated; cursor: crosshair; box-shadow: 0 0 0 2px var(--rust), 0 12px 50px #000c; }
	footer { display: flex; gap: 18px; padding: 7px 16px; background: var(--panel); border-top: 1px solid var(--line); font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; }
	footer b { color: var(--bone); font-weight: 600; }
	#saved { color: var(--amber); margin-left: auto; }
	.hint { font-size: 11px; color: var(--dim); margin-top: 6px; }
	kbd { background: var(--panel2); border: 1px solid var(--line); padding: 0 4px; font-size: 11px; }
</style>
</head>
<body>
<header>
	<h1>MAPFORGE</h1>
	<span class="sub" id="mapname">DEATHLANDS USA · 60× · 75×42.5 km</span>
	<a href="/api/help" target="_blank">API — for humans &amp; AIs</a>
</header>
<main>
	<div id="side">
		<div class="sec">
			<h2>Tool</h2>
			<div class="row">
				<button id="t-paint" class="on">PAINT</button>
				<button id="t-road">ROAD</button>
				<button id="t-town">TOWN</button>
				<button id="t-inspect">INSPECT</button>
			</div>
			<div class="hint" id="toolhint">Drag to paint. <kbd>1</kbd>/<kbd>3</kbd>/<kbd>5</kbd> brush.</div>
		</div>
		<div class="sec">
			<h2>Biome palette</h2>
			<div class="swatches" id="palette"></div>
		</div>
		<div class="sec">
			<h2>Brush</h2>
			<div class="row">
				<button data-b="1" class="brush on">1</button>
				<button data-b="3" class="brush">3</button>
				<button data-b="5" class="brush">5</button>
				<button data-b="9" class="brush">9</button>
			</div>
		</div>
		<div class="sec">
			<h2>Layers</h2>
			<div class="row">
				<button id="l-states" class="on">STATE LINES</button>
				<button id="l-roads" class="on">ROADS</button>
				<button id="l-towns" class="on">TOWNS</button>
			</div>
		</div>
		<div class="sec">
			<h2>Roads</h2>
			<select id="roadsel" style="width:100%"></select>
			<div class="row" style="margin-top:6px">
				<button id="road-new">NEW</button>
				<button id="road-del" class="danger">DELETE</button>
			</div>
			<div class="hint">ROAD tool: click map to append points to the selected road.</div>
		</div>
		<div class="sec">
			<h2>Reload</h2>
			<button id="reload">RE-READ FROM DISK</button>
			<div class="hint">Every edit saves straight into game/data/usmap.json — restart the game to drive it.</div>
		</div>
	</div>
	<div id="wrap"><canvas id="cv"></canvas></div>
</main>
<footer>
	<span id="pos">—</span>
	<span id="info">—</span>
	<span id="saved"></span>
</footer>
<script>
const COLORS = {
	ocean: "#0d1a26", water: "#1e4a63", forest: "#3d5426", scrub: "#6b5a3d",
	plains: "#736b46", farmland: "#8c7a42", desert: "#94764c", mountains: "#6b6862",
	swamp: "#40513a", urban: "#7d776e",
};
let meta = null, rows = [], states = [], roads = [], towns = [];
let tool = "paint", biome = "forest", brush = 1, painting = false, stroke = [];
let showStates = true, showRoads = true, showTowns = true;
let PX = 8;
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");

async function api(path, opts) {
	const r = await fetch(path, opts);
	const j = await r.json();
	if (!r.ok) throw new Error(j.error || r.status);
	return j;
}
function savedFlash(msg) {
	const el = document.getElementById("saved");
	el.textContent = msg;
	clearTimeout(el._t); el._t = setTimeout(() => el.textContent = "", 1800);
}
async function load() {
	meta = await api("/api/meta");
	rows = (await api("/api/grid?layer=biomes")).rows;
	states = (await api("/api/grid?layer=states")).rows;
	roads = await api("/api/roads");
	towns = await api("/api/towns");
	document.getElementById("mapname").textContent =
		`${meta.name} · ${meta.compression}× · ${meta.world_km[0]}×${meta.world_km[1]} km · ${meta.w}×${meta.h} cells of ${meta.cell_m} m`;
	PX = Math.max(4, Math.floor(Math.min((innerWidth - 280) / meta.w, (innerHeight - 130) / meta.h)));
	cv.width = meta.w * PX; cv.height = meta.h * PX;
	buildPalette(); buildRoadSel(); draw();
}
function buildPalette() {
	const pal = document.getElementById("palette");
	pal.innerHTML = "";
	for (const [ch, name] of Object.entries(meta.legend)) {
		const d = document.createElement("div");
		d.className = "sw" + (name === biome ? " on" : "");
		d.innerHTML = `<i style="background:${COLORS[name] || "#333"}"></i>${name}`;
		d.onclick = () => { biome = name; document.querySelectorAll(".sw").forEach(s => s.classList.remove("on")); d.classList.add("on"); };
		pal.appendChild(d);
	}
}
function buildRoadSel() {
	const sel = document.getElementById("roadsel");
	sel.innerHTML = roads.map(r => `<option>${r.id}</option>`).join("");
}
const w2p = (wx, wz) => [(wx - meta.world_offset[0]) / meta.cell_m * PX, (wz - meta.world_offset[1]) / meta.cell_m * PX];
function draw() {
	for (let z = 0; z < meta.h; z++)
		for (let x = 0; x < meta.w; x++) {
			ctx.fillStyle = COLORS[meta.legend[rows[z][x]]] || "#222";
			ctx.fillRect(x * PX, z * PX, PX, PX);
		}
	if (showStates) { // state borders: draw a line where the state char changes
		ctx.strokeStyle = "rgba(232,224,207,.28)"; ctx.lineWidth = 1;
		ctx.beginPath();
		for (let z = 0; z < meta.h; z++)
			for (let x = 0; x < meta.w; x++) {
				if (x + 1 < meta.w && states[z][x] !== states[z][x + 1] && states[z][x] !== "." && states[z][x + 1] !== ".") {
					ctx.moveTo((x + 1) * PX, z * PX); ctx.lineTo((x + 1) * PX, (z + 1) * PX);
				}
				if (z + 1 < meta.h && states[z][x] !== states[z + 1][x] && states[z][x] !== "." && states[z + 1][x] !== ".") {
					ctx.moveTo(x * PX, (z + 1) * PX); ctx.lineTo((x + 1) * PX, (z + 1) * PX);
				}
			}
		ctx.stroke();
	}
	if (showRoads) {
		ctx.strokeStyle = "#d9c48a"; ctx.lineWidth = Math.max(1.5, PX * 0.22);
		for (const r of roads) {
			ctx.beginPath();
			r.pts.forEach((p, i) => { const [px, pz] = w2p(p[0], p[1]); i ? ctx.lineTo(px, pz) : ctx.moveTo(px, pz); });
			ctx.stroke();
		}
		const sel = document.getElementById("roadsel").value;
		const r = roads.find(r => r.id === sel);
		if (r) {
			ctx.fillStyle = "#f0b429";
			for (const p of r.pts) { const [px, pz] = w2p(p[0], p[1]); ctx.fillRect(px - 2.5, pz - 2.5, 5, 5); }
		}
	}
	if (showTowns) {
		for (const t of towns) {
			const [px, pz] = w2p(t.pos[0], t.pos[1]);
			ctx.fillStyle = t.kind === "city" ? "#f0b429" : "#c9995c";
			ctx.beginPath(); ctx.arc(px, pz, t.kind === "city" ? 4 : 3, 0, 7); ctx.fill();
			ctx.fillStyle = "#e8e0cf"; ctx.font = `${Math.max(9, PX + 1)}px ui-monospace, monospace`;
			ctx.fillText(t.name, px + 6, pz + 3);
		}
	}
}
function cellAt(ev) {
	const r = cv.getBoundingClientRect();
	return [Math.floor((ev.clientX - r.left) / PX), Math.floor((ev.clientY - r.top) / PX)];
}
function paintAt(x, z) {
	const half = Math.floor(brush / 2);
	const ch = Object.entries(meta.legend).find(([, n]) => n === biome)[0];
	for (let dz = -half; dz <= half; dz++)
		for (let dx = -half; dx <= half; dx++) {
			const nx = x + dx, nz = z + dz;
			if (nx < 0 || nx >= meta.w || nz < 0 || nz >= meta.h) continue;
			if (rows[nz][nx] === ch) continue;
			rows[nz] = rows[nz].substring(0, nx) + ch + rows[nz].substring(nx + 1);
			stroke.push([nx, nz]);
		}
	draw();
}
cv.addEventListener("mousedown", async (ev) => {
	const [x, z] = cellAt(ev);
	if (tool === "paint") { painting = true; stroke = []; paintAt(x, z); }
	else if (tool === "road") {
		const id = document.getElementById("roadsel").value;
		const r = roads.find(r => r.id === id);
		if (!r) return savedFlash("no road selected — NEW first");
		r.pts.push([meta.world_offset[0] + (x + 0.5) * meta.cell_m, meta.world_offset[1] + (z + 0.5) * meta.cell_m]);
		await api("/api/roads", { method: "POST", body: JSON.stringify(r) });
		savedFlash(`${id}: point ${r.pts.length} saved`); draw();
	} else if (tool === "town") {
		const name = prompt("Town name (empty = cancel):");
		if (!name) return;
		const id = name.toLowerCase().replace(/[^a-z0-9]/g, "");
		const t = { id, name: name.toUpperCase(), pos: [meta.world_offset[0] + (x + 0.5) * meta.cell_m, meta.world_offset[1] + (z + 0.5) * meta.cell_m], kind: "ville" };
		await api("/api/towns", { method: "POST", body: JSON.stringify(t) });
		towns = await api("/api/towns"); savedFlash(`${t.name} founded`); draw();
	} else if (tool === "inspect") {
		const info = await api(`/api/cell?x=${x}&z=${z}`);
		document.getElementById("info").innerHTML =
			`<b>${info.biome}</b> · ${info.state || "open water"} · road <b>${info.nearest_road?.id ?? "—"}</b> ${info.nearest_road ? info.nearest_road.dist_m + " m" : ""} · town <b>${info.nearest_town?.name ?? "—"}</b> ${info.nearest_town ? info.nearest_town.dist_m + " m" : ""}`;
	}
});
addEventListener("mousemove", (ev) => {
	if (painting && ev.target === cv) { const [x, z] = cellAt(ev); paintAt(x, z); }
	if (ev.target === cv && meta) {
		const [x, z] = cellAt(ev);
		const wx = Math.round(meta.world_offset[0] + (x + 0.5) * meta.cell_m);
		const wz = Math.round(meta.world_offset[1] + (z + 0.5) * meta.cell_m);
		document.getElementById("pos").innerHTML = `cell <b>${x},${z}</b> · world <b>${wx}, ${wz}</b> m · <b>${meta.legend[rows[z]?.[x]] ?? "?"}</b>${showStates ? " · " + (meta.state_legend[states[z]?.[x]] ?? "") : ""}`;
	}
});
addEventListener("mouseup", async () => {
	if (!painting) return;
	painting = false;
	if (stroke.length) {
		await api("/api/paint", { method: "POST", body: JSON.stringify({ biome, cells: stroke }) });
		savedFlash(`${stroke.length} cells → disk`);
	}
});
for (const [id, t] of [["t-paint", "paint"], ["t-road", "road"], ["t-town", "town"], ["t-inspect", "inspect"]])
	document.getElementById(id).onclick = () => {
		tool = t;
		document.querySelectorAll("#side .sec:first-child button").forEach(b => b.classList.remove("on"));
		document.getElementById(id).classList.add("on");
		document.getElementById("toolhint").textContent = {
			paint: "Drag to paint. 1/3/5/9 brush.", road: "Click to append points to the selected road.",
			town: "Click to found a town.", inspect: "Click a cell for the full readout.",
		}[t];
	};
document.querySelectorAll(".brush").forEach(b => b.onclick = () => {
	brush = Number(b.dataset.b);
	document.querySelectorAll(".brush").forEach(x => x.classList.remove("on")); b.classList.add("on");
});
addEventListener("keydown", (e) => { if ("1359".includes(e.key)) document.querySelector(`.brush[data-b="${e.key}"]`)?.click(); });
for (const [id, fn] of [["l-states", v => showStates = v], ["l-roads", v => showRoads = v], ["l-towns", v => showTowns = v]])
	document.getElementById(id).onclick = (ev) => { ev.target.classList.toggle("on"); fn(ev.target.classList.contains("on")); draw(); };
document.getElementById("road-new").onclick = async () => {
	const id = prompt("Road id (e.g. US-50):");
	if (!id) return;
	roads.push({ id, kind: "interstate", pts: [] });
	buildRoadSel();
	document.getElementById("roadsel").value = id;
	savedFlash(`${id}: now click 2+ points on the map`);
};
document.getElementById("road-del").onclick = async () => {
	const id = document.getElementById("roadsel").value;
	if (!id || !confirm(`Delete ${id}?`)) return;
	await api(`/api/roads?id=${encodeURIComponent(id)}`, { method: "DELETE" });
	roads = await api("/api/roads"); buildRoadSel(); savedFlash(`${id} deleted`); draw();
};
document.getElementById("reload").onclick = load;
load();
</script>
</body>
</html>
