<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>THE SHOWROOM — DRIVN visual QA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128663;</text></svg>">
<style>
	:root {
		--ink:#14110c; --panel:#1d1913; --panel2:#262017; --bone:#e8e0cf; --dim:#9a8f78;
		--amber:#f0b429; --rust:#8a4a2b; --blood:#c0392b; --line:#3a3226; --good:#4caf6a;
	}
	* { margin:0; padding:0; box-sizing:border-box; }
	body { background:var(--ink); color:var(--bone); font:14px/1.45 ui-monospace,"Cascadia Mono",Consolas,monospace; min-height:100vh; }
	header { display:flex; align-items:center; gap:16px; padding:12px 18px; border-bottom:2px solid var(--rust); background:var(--panel); position:sticky; top:0; z-index:5; flex-wrap:wrap; }
	header h1 { font-size:18px; letter-spacing:3px; color:var(--amber); font-weight:700; }
	header .sub { color:var(--dim); font-size:12px; letter-spacing:1px; }
	header .spacer { flex:1; }
	.tabs { display:flex; gap:6px; }
	.tabs button { background:var(--panel2); color:var(--dim); border:1px solid var(--line); padding:6px 14px; font:inherit; font-size:12px; letter-spacing:1px; cursor:pointer; border-radius:999px; }
	.tabs button.on { color:var(--ink); background:var(--amber); border-color:var(--amber); font-weight:700; }
	.tabs button:hover:not(.on) { border-color:var(--amber); color:var(--bone); }
	#rerender { background:var(--panel2); color:var(--amber); border:1px solid var(--amber); padding:6px 14px; font:inherit; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; border-radius:.4rem; }
	#rerender:hover { background:var(--amber); color:var(--ink); }
	#rerender:disabled { opacity:.5; cursor:default; background:var(--panel2); color:var(--dim); border-color:var(--line); }
	#status { color:var(--dim); font-size:12px; margin-left:10px; }
	#status.busy { color:var(--amber); }
	main { padding:18px; max-width:1600px; margin:0 auto; }
	.emptystate { text-align:center; color:var(--dim); padding:4rem 1rem; }
	.emptystate b { color:var(--amber); }
	#log { display:none; background:var(--panel); border:1px solid var(--line); border-radius:.5rem; padding:10px 14px; margin-bottom:16px; max-height:160px; overflow-y:auto; font-size:11px; color:var(--dim); white-space:pre-wrap; }
	#log.show { display:block; }
	.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
	.card { background:var(--panel); border:1px solid var(--line); border-radius:.6rem; overflow:hidden; cursor:pointer; transition:border-color .2s, transform .2s; }
	.card:hover { border-color:var(--amber); transform:translateY(-2px); }
	.card .thumb { width:100%; aspect-ratio:16/9; background:var(--ink) center/cover no-repeat; }
	.card .body { padding:8px 10px; }
	.card .name { font-weight:700; color:var(--bone); font-size:13px; }
	.card .meta { color:var(--dim); font-size:11px; margin-top:2px; }
	.card .angles { color:var(--dim); font-size:10px; margin-top:4px; letter-spacing:.5px; }
	h2.sec { font-size:12px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin:22px 0 10px; border-bottom:1px solid var(--line); padding-bottom:6px; }
	h2.sec:first-child { margin-top:0; }
	/* modal */
	#modal { position:fixed; inset:0; background:rgba(10,8,5,.88); display:none; align-items:center; justify-content:center; z-index:20; padding:2rem; }
	#modal.show { display:flex; }
	#modal .box { background:var(--panel); border:1px solid var(--amber); border-radius:.6rem; max-width:92vw; max-height:92vh; overflow-y:auto; padding:16px; }
	#modal .mhead { display:flex; align-items:baseline; gap:12px; margin-bottom:10px; }
	#modal h3 { color:var(--amber); font-size:18px; letter-spacing:1px; }
	#modal .id { color:var(--dim); font-size:12px; }
	#modal .close { margin-left:auto; background:var(--panel2); color:var(--bone); border:1px solid var(--line); padding:4px 10px; cursor:pointer; }
	#modal .facts { color:var(--dim); font-size:12px; margin-bottom:12px; }
	#modal .shots { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px; }
	#modal .shots figure { background:var(--ink); border:1px solid var(--line); border-radius:.4rem; overflow:hidden; }
	#modal .shots img { width:100%; display:block; }
	#modal .shots figcaption { text-align:center; font-size:11px; color:var(--dim); padding:4px; letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
<header>
	<h1>&#128663; THE SHOWROOM</h1>
	<div class="sub">every vehicle + structure row, rendered — a green sim proves structure, never looks</div>
	<div class="spacer"></div>
	<div class="tabs" id="modeTabs">
		<button data-mode="vehicles">VEHICLES</button>
		<button data-mode="structures">STRUCTURES</button>
		<button data-mode="all" class="on">ALL</button>
	</div>
	<button id="rerender">&#8635; RE-RENDER</button>
	<span id="status"></span>
</header>
<main>
	<pre id="log"></pre>
	<div id="content"><div class="emptystate">Loading manifest…</div></div>
</main>
<div id="modal">
	<div class="box">
		<div class="mhead">
			<h3 id="mName"></h3>
			<span class="id" id="mId"></span>
			<button class="close" onclick="closeModal()">&#10005; CLOSE</button>
		</div>
		<div class="facts" id="mFacts"></div>
		<div class="shots" id="mShots"></div>
	</div>
</div>
<script>
let manifest = { shots: [] };
let filterMode = "all"; // which CATEGORY tab is showing (vehicles/structures/all) — independent of re-render mode

async function loadManifest() {
	const r = await fetch("/api/manifest");
	manifest = await r.json();
	render();
}

function render() {
	const content = document.getElementById("content");
	if (!manifest.shots || manifest.shots.length === 0) {
		content.innerHTML = '<div class="emptystate">No renders yet. Click <b>RE-RENDER</b> above — it opens a real Godot window '
			+ '(image capture needs a live GPU swapchain) and shoots every row. Takes a minute or two.</div>';
		return;
	}
	const cats = [["vehicles", "VEHICLES"], ["structures", "STRUCTURES"]];
	let html = "";
	for (const [cat, label] of cats) {
		if (filterMode !== "all" && filterMode !== cat) continue;
		const rows = manifest.shots.filter((s) => s.category === cat).sort((a, b) => a.id.localeCompare(b.id));
		if (rows.length === 0) continue;
		html += \`<h2 class="sec">\${label} (\${rows.length})</h2><div class="grid">\`;
		for (const row of rows) {
			const thumbAngle = row.angles.includes("front34") ? "front34" : row.angles.includes("34") ? "34" : row.angles[0];
			const thumb = \`/img/\${cat}/\${row.id}_\${thumbAngle}.png\`;
			const meta = cat === "vehicles" ? (row.family || "") : (row.category_tag || "");
			html += \`<div class="card" onclick='openModal(\${JSON.stringify(JSON.stringify(row))})'>
				<div class="thumb" style="background-image:url('\${thumb}')"></div>
				<div class="body">
					<div class="name">\${row.display_name || row.id}</div>
					<div class="meta">\${row.id} \${meta ? "· " + meta : ""}</div>
					<div class="angles">\${row.angles.join(" · ")}</div>
				</div>
			</div>\`;
		}
		html += "</div>";
	}
	content.innerHTML = html || '<div class="emptystate">Nothing in this category yet.</div>';
}

function openModal(rowJson) {
	const row = JSON.parse(rowJson);
	document.getElementById("mName").textContent = row.display_name || row.id;
	document.getElementById("mId").textContent = row.id;
	const facts = [];
	if (row.family) facts.push("family: " + row.family);
	if (row.category_tag) facts.push("category: " + row.category_tag);
	if (row.footprint_m) facts.push("footprint: " + row.footprint_m[0] + "×" + row.footprint_m[1] + "m");
	if (row.floors) facts.push("floors: " + row.floors);
	document.getElementById("mFacts").textContent = facts.join("  ·  ");
	document.getElementById("mShots").innerHTML = row.angles.map((a) =>
		\`<figure><img src="/img/\${row.category}/\${row.id}_\${a}.png" loading="lazy"><figcaption>\${a}</figcaption></figure>\`
	).join("");
	document.getElementById("modal").classList.add("show");
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }
document.getElementById("modal").addEventListener("click", (e) => { if (e.target.id === "modal") closeModal(); });

for (const b of document.querySelectorAll("#modeTabs button")) {
	b.onclick = () => {
		for (const x of document.querySelectorAll("#modeTabs button")) x.classList.remove("on");
		b.classList.add("on");
		filterMode = b.dataset.mode;
		render();
	};
}

let polling = null;
async function pollStatus() {
	const r = await fetch("/api/status");
	const s = await r.json();
	const statusEl = document.getElementById("status");
	const logEl = document.getElementById("log");
	document.getElementById("rerender").disabled = s.busy;
	if (s.busy) {
		statusEl.textContent = "rendering…"; statusEl.classList.add("busy");
		logEl.classList.add("show"); logEl.textContent = s.log.join("\\n");
		logEl.scrollTop = logEl.scrollHeight;
	} else {
		statusEl.classList.remove("busy");
		statusEl.textContent = manifest.generated ? ("last render: " + manifest.generated) : "";
		if (polling) { clearInterval(polling); polling = null; manifest = s.manifest; render(); logEl.classList.remove("show"); }
	}
}

document.getElementById("rerender").onclick = async () => {
	const mode = filterMode === "all" ? "all" : filterMode; // re-render just what you're looking at
	document.getElementById("rerender").disabled = true;
	document.getElementById("log").classList.add("show");
	document.getElementById("log").textContent = "requesting render (mode=" + mode + ")…";
	const r = await fetch("/api/rerender", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ mode }) });
	if (!r.ok) { const e = await r.json(); alert("rerender failed: " + (e.error || r.status)); document.getElementById("rerender").disabled = false; return; }
	polling = setInterval(pollStatus, 1000);
};

loadManifest();
setInterval(() => { if (!polling) pollStatus(); }, 5000);
</script>
</body>
</html>
